<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Vextorn — Talk. Share. Belong.</title>
    <meta name="description" content="Vextorn is a real-time, voice-first community where you join live audio rooms by language and level to talk, share, and belong." />
    <meta name="keywords" content="vextorn, voice chat, language practice, speaking practice, language learning, conversation, community" />
    <meta name="author" content="Vextorn" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0d0b18" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon + Apple touch icons -->
    <link rel="icon" type="image/svg+xml" href="/vextorn-mark.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/vextorn-icon-192.png" />
    <link rel="apple-touch-icon" href="/vextorn-icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/vextorn-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/vextorn-icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/vextorn-icon-192.png" />

    <!-- iOS PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vextorn" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vextorn — Talk. Share. Belong." />
    <meta property="og:description" content="Join live audio rooms to practice any language with real people around the world." />
    <meta property="og:image" content="/vextorn-icon-512.png" />
    <meta property="og:site_name" content="Vextorn" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vextorn — Talk. Share. Belong." />
    <meta name="twitter:description" content="Real-time voice rooms for language practice and community." />
    <meta name="twitter:image" content="/vextorn-icon-512.png" />

    <!-- SEO: canonical + robots + structured data -->
    <link rel="canonical" href="https://vextorn.com/" />
    <meta name="robots" content="index, follow" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Vextorn",
      "alternateName": "Vextorn — Talk. Share. Belong.",
      "url": "https://vextorn.com/",
      "description": "Vextorn is a real-time, voice-first community where you join live audio rooms by language and level to talk, share, and belong.",
      "applicationCategory": "CommunicationApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "Vextorn", "logo": "/vextorn-icon-512.png" }
    }
    </script>

    <!-- Performance: preconnect to CDNs used in the app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font load: non-render-blocking. The link starts as a print-only
         stylesheet (which the browser doesn't render-block on), and a tiny
         inline script flips it to "all" media once the file is ready. We
         use a real <script> tag (not an inline event handler attribute) so
         it stays compatible with the strict script-src-attr 'none' CSP.
         The <noscript> fallback keeps the site readable without JS. -->
    <link
      id="font-space-grotesk"
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      media="print"
    />
    <script>
      (function () {
        var l = document.getElementById("font-space-grotesk");
        if (!l) return;
        function swap() { l.media = "all"; }
        if (l.sheet) { swap(); return; }
        l.addEventListener("load", swap);
        l.addEventListener("error", swap);
      })();
    </script>
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Connect early to avatar/video CDNs the lobby reads from on first paint. -->
    <link rel="preconnect" href="https://randomuser.me" crossorigin />
    <link rel="dns-prefetch" href="https://randomuser.me" />

    <!-- YouTube embeds are deferred and only load on user interaction, so use
         dns-prefetch (cheap) instead of preconnect (opens TLS sockets that
         fight the LCP candidate for bandwidth on slow mobile networks). -->
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://s.ytimg.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
