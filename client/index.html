<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Connect2Talk - Real-time Voice Chat for Language Practice</title>
    <meta name="description" content="A real-time, voice-only language practice platform where users instantly join public audio rooms by language and level." />
    <meta name="keywords" content="language practice, voice chat, speaking practice, language learning, ESL, conversation" />
    <meta name="author" content="Connect2Talk" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0d0b18" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon + Apple touch icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/favicon.png" />

    <!-- iOS PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Connect2Talk" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Connect2Talk - Real-time Voice Chat for Language Practice" />
    <meta property="og:description" content="Join live audio rooms to practice any language with real people around the world." />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:site_name" content="Connect2Talk" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Connect2Talk" />
    <meta name="twitter:description" content="Real-time voice rooms for language practice." />
    <meta name="twitter:image" content="/favicon.png" />

    <!-- Performance: preconnect to CDNs used in the app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin />
    <link rel="preconnect" href="https://www.youtube.com" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    <link rel="preconnect" href="https://s.ytimg.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://s.ytimg.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
