<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Vextorn — Option B: Sonic V">
  <defs>
    <linearGradient id="ob-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFB"/>
      <stop offset="100%" stop-color="#F1F2F6"/>
    </linearGradient>
    <linearGradient id="ob-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="ob-bar-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <style>
      .ob-label { font-family: "Inter", system-ui, sans-serif; font-weight:600; font-size:13px; letter-spacing:3px; fill:#94A3B8; text-transform:uppercase; }
      .ob-title { font-family: "Inter", system-ui, sans-serif; font-weight:700; font-size:18px; fill:#0F172A; letter-spacing:-0.3px; }
      .ob-desc  { font-family: "Inter", system-ui, sans-serif; font-weight:400; font-size:14px; fill:#64748B; letter-spacing:0.1px; }
      .ob-word  { font-family: "Inter", "SF Pro Display", system-ui, sans-serif; font-weight:800; font-size:80px; fill:#0A0E1F; letter-spacing:-3.4px; }
      .ob-tag   { font-family: "Inter", system-ui, sans-serif; font-weight:600; font-size:14px; fill:#64748B; letter-spacing:5.5px; text-transform:uppercase; }
    </style>
    <symbol id="ob-mark" viewBox="0 0 200 200">
      <rect x="22"  y="86"  width="20" height="48"  rx="6" />
      <rect x="58"  y="62"  width="20" height="96"  rx="6" />
      <rect x="94"  y="44"  width="20" height="132" rx="6" />
      <rect x="130" y="62"  width="20" height="96"  rx="6" />
      <rect x="166" y="86"  width="20" height="48"  rx="6" transform="translate(-8,0)"/>
    </symbol>
    <symbol id="ob-mark-real" viewBox="0 0 200 200">
      <g>
        <rect x="22"  y="100" width="20" height="42" rx="5"/>
        <rect x="56"  y="78"  width="20" height="86" rx="5"/>
        <rect x="90"  y="56"  width="20" height="130" rx="5"/>
        <rect x="124" y="78"  width="20" height="86" rx="5"/>
        <rect x="158" y="100" width="20" height="42" rx="5"/>
      </g>
    </symbol>
  </defs>

  <rect width="1600" height="900" fill="url(#ob-bg)"/>

  <text x="80" y="80" class="ob-label">Option B</text>
  <text x="80" y="118" class="ob-title">Sonic V — voice-forward, monochrome, refined</text>
  <text x="80" y="146" class="ob-desc">Five rising bars form a V silhouette. Quietly distinctive, immediately reads as voice/audio.</text>

  <g transform="translate(120,220)">
    <rect x="-20" y="-20" width="360" height="360" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(60,60) scale(1.6)" fill="url(#ob-bar)">
      <use href="#ob-mark-real"/>
    </g>
  </g>

  <g transform="translate(560,220)">
    <rect x="-20" y="-20" width="360" height="360" rx="28" fill="#0A0E1F"/>
    <g transform="translate(60,60) scale(1.6)" fill="url(#ob-bar-dark)">
      <use href="#ob-mark-real"/>
    </g>
  </g>

  <g transform="translate(1000,260)">
    <text x="0" y="60" class="ob-label">Icon scale</text>
    <g transform="translate(0,90)">
      <rect x="-12" y="-12" width="56" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <g transform="translate(0,0) scale(0.16)" fill="url(#ob-bar)"><use href="#ob-mark-real"/></g>
    </g>
    <g transform="translate(80,90)">
      <rect x="-12" y="-12" width="80" height="80" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <g transform="translate(8,8) scale(0.22)" fill="url(#ob-bar)"><use href="#ob-mark-real"/></g>
    </g>
    <g transform="translate(190,90)">
      <rect x="-12" y="-12" width="120" height="120" rx="20" fill="#0A0E1F"/>
      <g transform="translate(20,20) scale(0.32)" fill="url(#ob-bar-dark)"><use href="#ob-mark-real"/></g>
    </g>
  </g>

  <g transform="translate(80,640)">
    <text x="0" y="0" class="ob-label">Lockup</text>
    <g transform="translate(0,30)">
      <g transform="translate(0,-5) scale(0.55)" fill="url(#ob-bar)"><use href="#ob-mark-real"/></g>
      <text x="125" y="80" class="ob-word">Vextorn</text>
      <text x="128" y="115" class="ob-tag">Talk. Share. Belong.</text>
    </g>
  </g>
</svg>
