<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Vextorn — Option C: Aperture">
  <defs>
    <linearGradient id="oc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFB"/>
      <stop offset="100%" stop-color="#F1F2F6"/>
    </linearGradient>

    <radialGradient id="oc-disc" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#0A0E1F"/>
    </radialGradient>
    <radialGradient id="oc-glow" cx="50%" cy="58%" r="40%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <style>
      .oc-label { font-family: "Inter", system-ui, sans-serif; font-weight:600; font-size:13px; letter-spacing:3px; fill:#94A3B8; text-transform:uppercase; }
      .oc-title { font-family: "Inter", system-ui, sans-serif; font-weight:700; font-size:18px; fill:#0F172A; letter-spacing:-0.3px; }
      .oc-desc  { font-family: "Inter", system-ui, sans-serif; font-weight:400; font-size:14px; fill:#64748B; letter-spacing:0.1px; }
      .oc-word  { font-family: "Inter", "SF Pro Display", system-ui, sans-serif; font-weight:800; font-size:80px; fill:#0A0E1F; letter-spacing:-3.4px; }
      .oc-tag   { font-family: "Inter", system-ui, sans-serif; font-weight:600; font-size:14px; fill:#64748B; letter-spacing:5.5px; text-transform:uppercase; }
    </style>

    <symbol id="oc-mark" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="92" fill="url(#oc-disc)"/>
      <circle cx="100" cy="100" r="92" fill="url(#oc-glow)"/>
      <g transform="translate(0,8)" fill="#F8FAFC">
        <path d="M 56 64 L 76 64 L 100 116 L 124 64 L 144 64 L 100 156 Z"/>
      </g>
      <circle cx="100" cy="100" r="92" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    </symbol>
  </defs>

  <rect width="1600" height="900" fill="url(#oc-bg)"/>

  <text x="80" y="80" class="oc-label">Option C</text>
  <text x="80" y="118" class="oc-title">Aperture — premium app-icon disc with carved V</text>
  <text x="80" y="146" class="oc-desc">Deep midnight indigo disc with an inner glow halo and a refined cream V. Reads instantly as a premium iOS-grade app icon.</text>

  <g transform="translate(120,220)">
    <rect x="-20" y="-20" width="360" height="360" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(60,60) scale(1.6)"><use href="#oc-mark"/></g>
  </g>

  <g transform="translate(560,220)">
    <rect x="-20" y="-20" width="360" height="360" rx="28" fill="#0A0E1F"/>
    <g transform="translate(60,60) scale(1.6)"><use href="#oc-mark"/></g>
  </g>

  <g transform="translate(1000,260)">
    <text x="0" y="60" class="oc-label">Icon scale</text>
    <g transform="translate(0,90)">
      <g transform="scale(0.16)"><use href="#oc-mark"/></g>
    </g>
    <g transform="translate(80,90)">
      <g transform="scale(0.22)"><use href="#oc-mark"/></g>
    </g>
    <g transform="translate(190,90)">
      <g transform="scale(0.32)"><use href="#oc-mark"/></g>
    </g>
  </g>

  <g transform="translate(80,640)">
    <text x="0" y="0" class="oc-label">Lockup</text>
    <g transform="translate(0,30)">
      <g transform="scale(0.55)"><use href="#oc-mark"/></g>
      <text x="125" y="80" class="oc-word">Vextorn</text>
      <text x="128" y="115" class="oc-tag">Talk. Share. Belong.</text>
    </g>
  </g>
</svg>
