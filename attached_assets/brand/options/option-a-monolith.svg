<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Vextorn — Option A: Monolith V">
  <defs>
    <linearGradient id="oa-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFB"/>
      <stop offset="100%" stop-color="#F1F2F6"/>
    </linearGradient>
    <linearGradient id="oa-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="oa-v-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <style>
      .oa-label { font-family: "Inter", system-ui, sans-serif; font-weight:600; font-size:13px; letter-spacing:3px; fill:#94A3B8; text-transform:uppercase; }
      .oa-title { font-family: "Inter", system-ui, sans-serif; font-weight:700; font-size:18px; fill:#0F172A; letter-spacing:-0.3px; }
      .oa-desc  { font-family: "Inter", system-ui, sans-serif; font-weight:400; font-size:14px; fill:#64748B; letter-spacing:0.1px; }
      .oa-word  { font-family: "Inter", "SF Pro Display", system-ui, sans-serif; font-weight:800; font-size:80px; fill:#0A0E1F; letter-spacing:-3.4px; }
      .oa-tag   { font-family: "Inter", system-ui, sans-serif; font-weight:600; font-size:14px; fill:#64748B; letter-spacing:5.5px; text-transform:uppercase; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#oa-bg)"/>

  <text x="80" y="80" class="oa-label">Option A</text>
  <text x="80" y="118" class="oa-title">Monolith V — single confident geometric mark</text>
  <text x="80" y="146" class="oa-desc">A bold owned wedge. Editorial, restrained, scales perfectly from favicon to billboard.</text>

  <g transform="translate(120,220)">
    <rect x="-20" y="-20" width="360" height="360" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(60,60) scale(1.1)">
      <path d="M 30 40 L 70 40 L 100 88 L 130 40 L 170 40 L 100 168 Z" fill="url(#oa-v)"/>
    </g>
  </g>

  <g transform="translate(560,220)">
    <rect x="-20" y="-20" width="360" height="360" rx="28" fill="#0A0E1F"/>
    <g transform="translate(60,60) scale(1.1)">
      <path d="M 30 40 L 70 40 L 100 88 L 130 40 L 170 40 L 100 168 Z" fill="url(#oa-v-dark)"/>
    </g>
  </g>

  <g transform="translate(1000,260)">
    <text x="0" y="60" class="oa-label">Icon scale</text>
    <g transform="translate(0,90)">
      <rect x="-12" y="-12" width="56" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <g transform="translate(0,0) scale(0.16)"><path d="M 30 40 L 70 40 L 100 88 L 130 40 L 170 40 L 100 168 Z" fill="url(#oa-v)"/></g>
    </g>
    <g transform="translate(80,90)">
      <rect x="-12" y="-12" width="80" height="80" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <g transform="translate(8,8) scale(0.22)"><path d="M 30 40 L 70 40 L 100 88 L 130 40 L 170 40 L 100 168 Z" fill="url(#oa-v)"/></g>
    </g>
    <g transform="translate(190,90)">
      <rect x="-12" y="-12" width="120" height="120" rx="20" fill="#0A0E1F"/>
      <g transform="translate(20,20) scale(0.32)"><path d="M 30 40 L 70 40 L 100 88 L 130 40 L 170 40 L 100 168 Z" fill="url(#oa-v-dark)"/></g>
    </g>
  </g>

  <g transform="translate(80,640)">
    <text x="0" y="0" class="oa-label">Lockup</text>
    <g transform="translate(0,30)">
      <g transform="scale(0.55)"><path d="M 30 40 L 70 40 L 100 88 L 130 40 L 170 40 L 100 168 Z" fill="url(#oa-v)"/></g>
      <text x="125" y="80" class="oa-word">Vextorn</text>
      <text x="128" y="115" class="oa-tag">Talk. Share. Belong.</text>
    </g>
  </g>
</svg>
