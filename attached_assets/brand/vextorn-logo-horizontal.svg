<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-label="Vextorn — Talk. Share. Belong.">
  <defs>
    <radialGradient id="hx-talk" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>
    <radialGradient id="hx-share" cx="40%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="hx-belong" cx="60%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#FBCFE8"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </radialGradient>
    <style>
      .vx-wordmark {
        font-family: "Inter", "SF Pro Display", "Helvetica Neue", system-ui, -apple-system, sans-serif;
        font-weight: 700;
        font-size: 64px;
        letter-spacing: -2px;
        fill: #0F172A;
      }
      .vx-tagline {
        font-family: "Inter", "SF Pro Text", "Helvetica Neue", system-ui, -apple-system, sans-serif;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 4px;
        fill: #64748B;
        text-transform: uppercase;
      }
    </style>
  </defs>

  <g transform="translate(20,20)">
    <circle cx="70" cy="50" r="34" fill="url(#hx-talk)" opacity="0.92"/>
    <circle cx="49" cy="88" r="34" fill="url(#hx-share)" opacity="0.88" style="mix-blend-mode:multiply"/>
    <circle cx="91" cy="88" r="34" fill="url(#hx-belong)" opacity="0.88" style="mix-blend-mode:multiply"/>
    <circle cx="70" cy="76" r="5" fill="#0F172A" opacity="0.88"/>
  </g>

  <g transform="translate(180,0)">
    <text x="0" y="92" class="vx-wordmark">Vextorn</text>
    <text x="3" y="125" class="vx-tagline">Talk. Share. Belong.</text>
  </g>
</svg>
