<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-label="Vextorn — Talk. Share. Belong.">
  <defs>
    <radialGradient id="sxv-talk" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#8B92FF"/>
      <stop offset="60%" stop-color="#5B6CFF"/>
      <stop offset="100%" stop-color="#3D4BE0"/>
    </radialGradient>
    <radialGradient id="sxv-share" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#C896FF"/>
      <stop offset="60%" stop-color="#9B5CFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="sxv-belong" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FF9FC4"/>
      <stop offset="60%" stop-color="#FF6BA1"/>
      <stop offset="100%" stop-color="#E1428A"/>
    </radialGradient>
    <linearGradient id="sxv-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <style>
      .vx-word-l {
        font-family: "Inter", "SF Pro Display", "Helvetica Neue", system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 84px;
        letter-spacing: -3.5px;
        fill: url(#sxv-word);
        text-anchor: middle;
      }
      .vx-tag-l {
        font-family: "Inter", "SF Pro Text", "Helvetica Neue", system-ui, -apple-system, sans-serif;
        font-weight: 600;
        font-size: 18px;
        letter-spacing: 7px;
        fill: #64748B;
        text-transform: uppercase;
        text-anchor: middle;
      }
    </style>
  </defs>

  <g transform="translate(180,50) rotate(-6 80 90)">
    <circle cx="80" cy="60" r="52" fill="url(#sxv-talk)"/>
    <circle cx="44" cy="124" r="52" fill="url(#sxv-share)" style="mix-blend-mode:multiply"/>
    <circle cx="116" cy="124" r="52" fill="url(#sxv-belong)" style="mix-blend-mode:multiply"/>
    <ellipse cx="68" cy="44" rx="8" ry="4.5" fill="#fff" opacity="0.55"/>
    <ellipse cx="32" cy="108" rx="8" ry="4.5" fill="#fff" opacity="0.45"/>
    <ellipse cx="104" cy="108" rx="8" ry="4.5" fill="#fff" opacity="0.45"/>
  </g>

  <text x="260" y="400" class="vx-word-l">Vextorn</text>
  <text x="260" y="445" class="vx-tag-l">Talk. Share. Belong.</text>
</svg>
