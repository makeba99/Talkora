<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-label="Vextorn — Talk. Share. Belong.">
  <defs>
    <radialGradient id="sx-talk" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>
    <radialGradient id="sx-share" cx="40%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="sx-belong" cx="60%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#FBCFE8"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </radialGradient>
    <style>
      .vx-wordmark-l {
        font-family: "Inter", "SF Pro Display", "Helvetica Neue", system-ui, -apple-system, sans-serif;
        font-weight: 700;
        font-size: 76px;
        letter-spacing: -2.5px;
        fill: #0F172A;
        text-anchor: middle;
      }
      .vx-tagline-l {
        font-family: "Inter", "SF Pro Text", "Helvetica Neue", system-ui, -apple-system, sans-serif;
        font-weight: 500;
        font-size: 18px;
        letter-spacing: 6px;
        fill: #64748B;
        text-transform: uppercase;
        text-anchor: middle;
      }
    </style>
  </defs>

  <g transform="translate(160,40)">
    <circle cx="80" cy="60" r="56" fill="url(#sx-talk)" opacity="0.92"/>
    <circle cx="46" cy="124" r="56" fill="url(#sx-share)" opacity="0.88" style="mix-blend-mode:multiply"/>
    <circle cx="114" cy="124" r="56" fill="url(#sx-belong)" opacity="0.88" style="mix-blend-mode:multiply"/>
    <circle cx="80" cy="100" r="8" fill="#0F172A" opacity="0.88"/>
  </g>

  <text x="240" y="370" class="vx-wordmark-l">Vextorn</text>
  <text x="240" y="412" class="vx-tagline-l">Talk. Share. Belong.</text>
</svg>
